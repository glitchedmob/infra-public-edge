apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
  namespace: reloader
spec:
  interval: 10m
  chart:
    spec:
      chart: reloader
      version: 2.2.8
      sourceRef:
        kind: HelmRepository
        name: stakater
        namespace: reloader
  install:
    createNamespace: true
  values:
    replicaCount: 1
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 50m
        memory: 64Mi
