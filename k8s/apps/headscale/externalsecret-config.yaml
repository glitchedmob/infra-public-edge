apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: headscale-config
  namespace: headscale
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: k8s-headscale
    kind: SecretStore
  target:
    name: headscale-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      templateFrom:
        - target: Data
          configMap:
            name: headscale-config-template
            items:
              - key: config.yaml
                templateAs: Values
  dataFrom:
    - extract:
        key: headscale-runtime
