apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: headscale
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: headplane-config-template
    files:
      - config.yaml=config.yaml.tmpl
resources:
  - pvc.yaml
  - service.yaml
  - deployment.yaml
  - ingress.yaml
  - externalsecret.yaml
  - externalsecret-config.yaml
