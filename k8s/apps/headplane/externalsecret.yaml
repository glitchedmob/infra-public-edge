apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: headplane-secrets
  namespace: headscale
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: headplane-secrets
    creationPolicy: Owner
  data:
    - secretKey: cookie_secret
      remoteRef:
        key: /homelab/x86-vps-node-01/headplane-cookie-secret
