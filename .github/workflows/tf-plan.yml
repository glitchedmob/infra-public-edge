name: Terraform Plan (PR)

on:
  pull_request:
    paths:
      - tf/**

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  validate:
    uses: glitchedmob/infra-gha/.github/workflows/tf-validate.yml@v0.3.0
    with:
      working-directory: tf
      init-backend: false

  plan:
    needs: validate
    uses: glitchedmob/infra-gha/.github/workflows/tf-plan-apply.yml@v0.3.0
    with:
      working-directory: tf
      plan-only: true
    secrets:
      envrc_content: |
        export TF_VAR_vultr_api_token="${{ secrets.VULTR_API_TOKEN }}"
        export TF_VAR_cloudflare_api_token="${{ secrets.CLOUDFLARE_API_TOKEN }}"
      aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
      output_encryption_key: ${{ secrets.OUTPUT_ENCRYPTION_KEY }}
