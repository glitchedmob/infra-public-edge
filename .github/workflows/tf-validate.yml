name: Terraform Validate

on:
  pull_request:
    paths:
      - tf/**
  push:
    branches:
      - main
    paths:
      - tf/**

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    uses: glitchedmob/infra-gha/.github/workflows/tf-validate.yml@v0.3.0
    with:
      working-directory: tf
