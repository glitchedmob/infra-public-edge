name: Terraform

on:
  push:
    branches: [main]
    paths: [tf/**]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  plan-apply:
    uses: glitchedmob/infra-gha/.github/workflows/tf-plan-apply.yml@v0.5.1
    with:
      working-directory: tf
    secrets:
      envrc_content: |
        export TF_VAR_vultr_api_token="${{ secrets.VULTR_API_TOKEN }}"
        export TF_VAR_cloudflare_api_token="${{ secrets.CLOUDFLARE_API_TOKEN }}"
      aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
      output_encryption_key: ${{ secrets.OUTPUT_ENCRYPTION_KEY }}
