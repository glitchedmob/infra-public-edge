name: Ansible Lint

on:
  pull_request:
    paths:
      - src/ansible/**
  push:
    branches:
      - main
    paths:
      - src/ansible/**

permissions:
  contents: read
  id-token: write

jobs:
  lint:
    uses: glitchedmob/infra-gha/.github/workflows/ansible-lint.yml@v0.6.0
    with:
      working-directory: src/ansible
