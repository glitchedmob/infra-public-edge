name: Ansible Run

on:
  workflow_dispatch:
    inputs:
      playbook:
        description: Playbook to run
        required: true
        type: choice
        options:
          - base-os-updates.yml
          - bootstrap.yml
          - apply.yml
          - tailscale-headscale.yml
      connectivity-mode:
        description: How to reach the edge node
        required: true
        type: choice
        options:
          - tailscale
          - public
        default: tailscale

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  run:
    uses: glitchedmob/infra-gha/.github/workflows/ansible-run.yml@v0.7.1
    with:
      working-directory: src/ansible
      initialize-terraform: true
      terraform-working-directory: src/tf
      playbook: ${{ inputs.playbook }}
      headscale-login-server: ${{ inputs.connectivity-mode == 'tailscale' && 'https://headscale.levizitting.com' || '' }}
    secrets:
      envrc_content: ${{ inputs.connectivity-mode == 'public' && 'export EDGE_CONNECTION_MODE=public' || '' }}
      aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
      output_encryption_key: ${{ secrets.OUTPUT_ENCRYPTION_KEY }}
      headscale_auth_key: ${{ inputs.connectivity-mode == 'tailscale' && secrets.HEADSCALE_AUTH_KEY || '' }}