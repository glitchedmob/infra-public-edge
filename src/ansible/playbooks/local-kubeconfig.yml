---
- name: Fetch local kubeconfig for Tailscale access
  hosts: x86-vps-node-01
  become: true
  vars:
    kubeconfig_output_path: "{{ lookup('env', 'HOME') }}/.kube/infra-public-edge.yaml"
  tasks:
    - name: Read kubeconfig from k3s server
      ansible.builtin.slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: remote_kubeconfig
      no_log: true

    - name: Parse kubeconfig
      ansible.builtin.set_fact:
        kubeconfig_document: "{{ remote_kubeconfig.content | b64decode | from_yaml }}"
      no_log: true

    - name: Rewrite kubeconfig for direct Tailscale access
      ansible.builtin.set_fact:
        kubeconfig_cluster: "{{ (kubeconfig_document.clusters | first).cluster }}"
      no_log: true

    - name: Set kubeconfig cluster endpoint for direct Tailscale access
      ansible.builtin.set_fact:
        kubeconfig_document:
          apiVersion: "{{ kubeconfig_document.apiVersion }}"
          kind: "{{ kubeconfig_document.kind }}"
          preferences: "{{ kubeconfig_document.preferences | default({}) }}"
          current-context: "{{ kubeconfig_document['current-context'] }}"
          clusters:
            - name: "{{ (kubeconfig_document.clusters | first).name }}"
              cluster: "{{ kubeconfig_cluster | combine({'server': 'https://x86-vps-node-01:6443', 'tls-server-name': 'x86-vps-node-01'}) }}"
          users: "{{ kubeconfig_document.users }}"
          contexts: "{{ kubeconfig_document.contexts }}"
      no_log: true

    - name: Ensure local kubeconfig directory exists
      delegate_to: localhost
      become: false
      ansible.builtin.file:
        path: "{{ kubeconfig_output_path | dirname }}"
        state: directory
        mode: "0700"

    - name: Write repo-local kubeconfig
      delegate_to: localhost
      become: false
      ansible.builtin.copy:
        content: "{{ kubeconfig_document | to_nice_yaml(indent=2) }}"
        dest: "{{ kubeconfig_output_path }}"
        mode: "0600"
      no_log: true
