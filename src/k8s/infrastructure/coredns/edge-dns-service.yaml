apiVersion: v1
kind: Service
metadata:
  name: edge-dns
  namespace: kube-system
spec:
  externalIPs:
    - 10.255.255.1
  selector:
    app.kubernetes.io/name: edge-dns
  ports:
    - name: dns
      port: 53
      targetPort: dns
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
      protocol: TCP
