apiVersion: k8up.io/v1
kind: Schedule
metadata:
  name: app-backup
spec:
  backend:
    repoPasswordSecretRef:
      name: app-k8up-repo-password
      key: password
    b2:
      bucket: levizitting-public-edge-backups
      path: app
      accountIDSecretRef:
        name: k8up-b2-credentials
        key: account-id
      accountKeySecretRef:
        name: k8up-b2-credentials
        key: account-key
  backup:
    schedule: '0 8 * * *'
    failedJobsHistoryLimit: 2
    successfulJobsHistoryLimit: 2
    labelSelectors:
      - matchLabels:
          backup.k8up.io/app: app
  check:
    schedule: '0 9 * * 1'
  prune:
    schedule: '0 10 * * 0'
    retention:
      keepLast: 5
      keepDaily: 14
      keepWeekly: 4
