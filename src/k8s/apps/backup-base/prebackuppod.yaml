apiVersion: k8up.io/v1
kind: PreBackupPod
metadata:
  name: app-backup
  labels:
    backup.k8up.io/app: app
spec:
  backupCommand: sh -c 'exit 1'
  fileExtension: .tar
  pod:
    spec:
      containers:
        - name: backup
          image: keinos/sqlite3:3.53.2
          command:
            - sh
            - -c
            - sleep 3600
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: app-data
      securityContext:
        runAsUser: 0
