apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: sgfdevs-zone-sni-passthrough
  namespace: edge-routing
spec:
  entryPoints:
    - websecure
  routes:
    - match: HostSNIRegexp(`^([a-z0-9-]+\.)*sgf\.dev$`)
      services:
        - name: sgfdevs-k3s
          port: 443
  tls:
    passthrough: true
