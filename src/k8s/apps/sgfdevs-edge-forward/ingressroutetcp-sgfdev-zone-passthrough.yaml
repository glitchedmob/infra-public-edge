apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: sgfdevs-zone-sni-passthrough
  namespace: edge-routing
spec:
  entryPoints:
    - websecure
  routes:
    - match: HostSNIRegexp(`^([a-z0-9-]+\\.)*sgf\\.dev$`)
      services:
        - name: sgfdevs-k3s-01
          port: 443
          weight: 1
        - name: sgfdevs-k3s-02
          port: 443
          weight: 1
  tls:
    passthrough: true
