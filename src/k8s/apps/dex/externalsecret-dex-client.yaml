apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: flux-web-client
  namespace: dex
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: flux-web-client
    creationPolicy: Owner
  data:
    - secretKey: client-secret
      remoteRef:
        key: /homelab/x86-vps-node-01/flux-web-client-secret
