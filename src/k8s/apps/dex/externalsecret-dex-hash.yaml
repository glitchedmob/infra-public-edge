apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dex-admin-password-bcrypt
  namespace: dex
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: dex-admin-password-bcrypt
    creationPolicy: Owner
  data:
    - secretKey: hash
      remoteRef:
        key: /homelab/x86-vps-node-01/dex-admin-password-bcrypt
