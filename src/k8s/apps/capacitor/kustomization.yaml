apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: capacitor
generatorOptions:
  disableNameSuffixHash: true
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - clusterrole-impersonator.yaml
  - clusterrolebinding-impersonator.yaml
  - clusterrolebinding-clusteradmin.yaml
  - configmap.yaml
  - externalsecret.yaml
  - service.yaml
  - deployment.yaml
  - ingress.yaml
