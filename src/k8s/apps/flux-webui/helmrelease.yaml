apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-web
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: flux-operator
      version: "0.45.1"
      sourceRef:
        kind: HelmRepository
        name: flux-operator
        namespace: flux-system
  install:
    createNamespace: false
  values:
    installCRDs: true
    web:
      serverOnly: true
      config:
        baseURL: https://flux.levizitting.com
        authentication:
          type: OAuth2
          oauth2:
            provider: OIDC
            issuerURL: https://dex.levizitting.com
            clientID: flux-web
      ingress:
        enabled: true
        className: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - host: flux.levizitting.com
            paths:
              - path: /
                pathType: Prefix
        tls:
          - secretName: flux-web-tls
            hosts:
              - flux.levizitting.com
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  valuesFrom:
    - kind: Secret
      name: flux-web-client
      valuesKey: client-secret
      targetPath: web.config.authentication.oauth2.clientSecret
