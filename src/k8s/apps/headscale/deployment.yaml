apiVersion: apps/v1
kind: Deployment
metadata:
  name: headscale
  namespace: headscale
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: headscale
  template:
    metadata:
      labels:
        app: headscale
    spec:
      containers:
        - name: headscale
          image: headscale/headscale:v0.29.1
          command:
            - headscale
            - serve
          volumeMounts:
            - name: config
              mountPath: /etc/headscale
              readOnly: true
            - name: extra-records
              mountPath: /etc/headscale-dns
              readOnly: true
            - name: data
              mountPath: /var/lib/headscale
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: metrics
            - containerPort: 3478
              protocol: UDP
              name: stun
          livenessProbe:
            exec:
              command:
                - headscale
                - health
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - headscale
                - health
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
          startupProbe:
            exec:
              command:
                - headscale
                - health
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 24
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: config
          secret:
            secretName: headscale-config
        - name: extra-records
          configMap:
            name: headscale-extra-records
        - name: data
          persistentVolumeClaim:
            claimName: headscale-data
