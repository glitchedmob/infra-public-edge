apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: headscale
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: headscale-config-template
    files:
      - config.yaml=config.yaml.tmpl
  - name: headscale-extra-records
    files:
      - extra-records.json=extra-records.json
resources:
  - ../backup-base
  - namespace.yaml
  - pvc.yaml
  - service.yaml
  - deployment.yaml
  - certificate.yaml
  - ingress.yaml
  - middleware-https-redirect.yaml
  - externalsecret-config.yaml
  - externalsecret-k8up-b2-credentials.yaml
  - externalsecret-k8up-repo-password.yaml
  - eso-k8s-store.yaml
patches:
  - path: backup-patch.yaml
    target:
      kind: PreBackupPod
      name: app-backup
  - path: schedule-patch.yaml
    target:
      kind: Schedule
      name: app-backup
