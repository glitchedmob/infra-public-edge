apiVersion: k8up.io/v1
kind: PreBackupPod
metadata:
  name: headscale-backup
  namespace: headscale
  labels:
    backup.k8up.io/app: headscale
spec:
  backupCommand: >-
    sh -c '
      mkdir -p /tmp/backup &&
      sqlite3 /data/db.sqlite ".backup /tmp/backup/db.sqlite" &&
      [ -f /data/private.key ] && cp /data/private.key /tmp/backup/ || true &&
      cp /data/noise_private.key /tmp/backup/ &&
      cp /data/derp_server_private.key /tmp/backup/ &&
      tar -cf - -C /tmp/backup .
    '
  fileExtension: .tar
  pod:
    spec:
      containers:
        - name: sqlite-backup
          image: keinos/sqlite3:3.51.3
          command:
            - sh
            - -c
            - sleep 3600
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: headscale-data
      securityContext:
        runAsUser: 0
