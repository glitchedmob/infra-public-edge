apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: lz-zone-sni-passthrough
  namespace: edge-routing
spec:
  entryPoints:
    - websecure
  routes:
    - match: HostSNIRegexp(`^([a-z0-9-]+\.)*levizitting\.com$`) && !HostSNI(`headscale.levizitting.com`) && !HostSNI(`levizitting.com`)
      services:
        - name: lz-k3s-01
          port: 443
          weight: 1
        - name: lz-k3s-02
          port: 443
          weight: 1
  tls:
    passthrough: true
