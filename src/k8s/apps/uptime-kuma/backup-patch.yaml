- op: replace
  path: /metadata/name
  value: uptime-kuma-backup
- op: replace
  path: /metadata/labels/backup.k8up.io~1app
  value: uptime-kuma
- op: replace
  path: /spec/backupCommand
  value: >-
    sh -c '
      mkdir -p /tmp/backup &&
      sqlite3 /app/data/kuma.db ".backup /tmp/backup/kuma.db" &&
      tar -cf - -C /tmp/backup .
    '
- op: replace
  path: /spec/pod/spec/containers/0/volumeMounts/0/mountPath
  value: /app/data
- op: replace
  path: /spec/pod/spec/volumes/0/persistentVolumeClaim/claimName
  value: uptime-kuma-data
