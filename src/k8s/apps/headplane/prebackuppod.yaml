apiVersion: k8up.io/v1
kind: PreBackupPod
metadata:
  name: headplane-backup
  namespace: headscale
  labels:
    backup.k8up.io/app: headplane
spec:
  backupCommand: >-
    sh -c '
      mkdir -p /tmp/backup &&
      sqlite3 /data/hp_persist.db ".backup /tmp/backup/hp_persist.db" &&
      tar -cf - -C /tmp/backup .
    '
  fileExtension: .tar
  pod:
    spec:
      containers:
        - name: sqlite-backup
          image: keinos/sqlite3:3.51.3
          command:
            - sh
            - -c
            - sleep 3600
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: headplane-data
      securityContext:
        runAsUser: 0
