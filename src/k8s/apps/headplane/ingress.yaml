apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: headplane
  namespace: headscale
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: headscale-https-redirect@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: headscale.levizitting.com
      http:
        paths:
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: headplane
                port:
                  name: http
  tls:
    - secretName: headscale-shared-tls
      hosts:
        - headscale.levizitting.com
