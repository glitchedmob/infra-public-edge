apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: public-edge-bootstrap-controllers
  namespace: flux-system
spec:
  interval: 5m
  path: ./src/k8s/bootstrap/controllers
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: infra
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: public-edge-bootstrap-config
  namespace: flux-system
spec:
  interval: 5m
  path: ./src/k8s/bootstrap/config
  prune: true
  wait: true
  dependsOn:
    - name: public-edge-bootstrap-controllers
  sourceRef:
    kind: GitRepository
    name: infra
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: public-edge-infrastructure
  namespace: flux-system
spec:
  interval: 5m
  path: ./src/k8s/infrastructure
  prune: true
  wait: true
  dependsOn:
    - name: public-edge-bootstrap-config
  sourceRef:
    kind: GitRepository
    name: infra
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: public-edge-edge-routing
  namespace: flux-system
spec:
  interval: 5m
  path: ./src/k8s/apps/edge-routing
  prune: true
  wait: true
  dependsOn:
    - name: public-edge-infrastructure
  sourceRef:
    kind: GitRepository
    name: infra
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: public-edge-headscale-stack
  namespace: flux-system
spec:
  interval: 5m
  path: ./src/k8s/apps/headscale-stack
  prune: true
  wait: true
  dependsOn:
    - name: public-edge-infrastructure
  sourceRef:
    kind: GitRepository
    name: infra
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: public-edge-uptime-kuma
  namespace: flux-system
spec:
  interval: 5m
  path: ./src/k8s/apps/uptime-kuma
  prune: true
  wait: true
  dependsOn:
    - name: public-edge-infrastructure
  sourceRef:
    kind: GitRepository
    name: infra
