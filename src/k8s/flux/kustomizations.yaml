apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: public-vps-traefik
  namespace: flux-system
spec:
  interval: 5m
  path: ./src/k8s/infrastructure/traefik
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: infra
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: public-vps-coredns
  namespace: flux-system
spec:
  interval: 5m
  path: ./src/k8s/infrastructure/coredns
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: infra
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: public-vps-cert-manager
  namespace: flux-system
spec:
  interval: 5m
  path: ./src/k8s/infrastructure/cert-manager
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: infra
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: public-vps-cert-manager-issuers
  namespace: flux-system
spec:
  interval: 5m
  path: ./src/k8s/infrastructure/cert-manager-issuers
  prune: true
  wait: true
  dependsOn:
    - name: public-vps-cert-manager
  sourceRef:
    kind: GitRepository
    name: infra
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: public-vps-external-secrets
  namespace: flux-system
spec:
  interval: 5m
  path: ./src/k8s/infrastructure/external-secrets
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: infra
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: public-vps-external-secrets-stores
  namespace: flux-system
spec:
  interval: 5m
  path: ./src/k8s/infrastructure/external-secrets-stores
  prune: true
  wait: true
  dependsOn:
    - name: public-vps-external-secrets
  sourceRef:
    kind: GitRepository
    name: infra
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: public-vps-reloader
  namespace: flux-system
spec:
  interval: 5m
  path: ./src/k8s/infrastructure/reloader
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: infra
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: public-vps-apps
  namespace: flux-system
spec:
  interval: 5m
  path: ./src/k8s/apps
  prune: true
  wait: true
  dependsOn:
    - name: public-vps-cert-manager-issuers
    - name: public-vps-external-secrets-stores
    - name: public-vps-reloader
    - name: public-vps-coredns
    - name: public-vps-traefik
  sourceRef:
    kind: GitRepository
    name: infra
