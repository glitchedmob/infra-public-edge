apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: public-edge-bootstrap
  namespace: flux-system
spec:
  interval: 5m
  path: ./src/k8s/bootstrap
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: infra
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: public-edge-infrastructure
  namespace: flux-system
spec:
  interval: 5m
  path: ./src/k8s/infrastructure
  prune: true
  wait: true
  dependsOn:
    - name: public-edge-bootstrap
  sourceRef:
    kind: GitRepository
    name: infra
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: public-vps-apps
  namespace: flux-system
spec:
  interval: 5m
  path: ./src/k8s/apps
  prune: true
  wait: true
  dependsOn:
    - name: public-edge-infrastructure
  sourceRef:
    kind: GitRepository
    name: infra
