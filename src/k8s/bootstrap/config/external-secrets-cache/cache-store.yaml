apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: cache-k8s
  namespace: external-secrets
spec:
  provider:
    kubernetes:
      remoteNamespace: external-secrets
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: eso-cache-reader
