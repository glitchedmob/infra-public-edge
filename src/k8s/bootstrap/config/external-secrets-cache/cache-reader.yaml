apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-cache-reader
  namespace: external-secrets
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-cache-reader
  namespace: external-secrets
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["ssm-cache"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectrulesreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-cache-reader
  namespace: external-secrets
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eso-cache-reader
subjects:
  - kind: ServiceAccount
    name: eso-cache-reader
    namespace: external-secrets
