apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: headscale-secrets
  namespace: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: cache-k8s
  target:
    name: headscale-secrets
  data:
    - secretKey: cookieSecret
      remoteRef:
        key: ssm-cache
        property: cookieSecret
    - secretKey: b2AccountId
      remoteRef:
        key: ssm-cache
        property: b2AccountId
    - secretKey: b2AccountKey
      remoteRef:
        key: ssm-cache
        property: b2AccountKey
    - secretKey: headscaleResticPassword
      remoteRef:
        key: ssm-cache
        property: headscaleResticPassword
    - secretKey: headplaneResticPassword
      remoteRef:
        key: ssm-cache
        property: headplaneResticPassword
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: uptime-kuma-secrets
  namespace: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: cache-k8s
  target:
    name: uptime-kuma-secrets
  data:
    - secretKey: b2AccountId
      remoteRef:
        key: ssm-cache
        property: b2AccountId
    - secretKey: b2AccountKey
      remoteRef:
        key: ssm-cache
        property: b2AccountKey
    - secretKey: uptimeKumaResticPassword
      remoteRef:
        key: ssm-cache
        property: uptimeKumaResticPassword
