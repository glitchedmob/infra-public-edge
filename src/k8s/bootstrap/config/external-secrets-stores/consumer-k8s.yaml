apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: headscale-k8s
spec:
  provider:
    kubernetes:
      remoteNamespace: external-secrets
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
          namespace: external-secrets
      auth:
        serviceAccount:
          name: eso-headscale-reader
          namespace: external-secrets
  conditions:
    - namespaces:
        - headscale
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: uptime-kuma-k8s
spec:
  provider:
    kubernetes:
      remoteNamespace: external-secrets
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
          namespace: external-secrets
      auth:
        serviceAccount:
          name: eso-uptime-kuma-reader
          namespace: external-secrets
  conditions:
    - namespaces:
        - uptime-kuma
