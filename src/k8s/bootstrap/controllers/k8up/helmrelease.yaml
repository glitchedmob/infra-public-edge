apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8up
  namespace: k8up
spec:
  interval: 10m
  chart:
    spec:
      chart: k8up
      version: 4.9.0
      sourceRef:
        kind: HelmRepository
        name: k8up
        namespace: k8up
  install:
    createNamespace: true
  values:
    replicaCount: 1
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
